name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate runtime Firebase config
        shell: bash
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID || vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID || vars.NEXT_PUBLIC_GA_ID }}
        run: |
          set -euo pipefail

          : "${NEXT_PUBLIC_FIREBASE_API_KEY:?Missing NEXT_PUBLIC_FIREBASE_API_KEY}"
          : "${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:?Missing NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
          : "${NEXT_PUBLIC_FIREBASE_PROJECT_ID:?Missing NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
          : "${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:?Missing NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}"
          : "${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:?Missing NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
          : "${NEXT_PUBLIC_FIREBASE_APP_ID:?Missing NEXT_PUBLIC_FIREBASE_APP_ID}"

          mkdir -p scripts

          cat > "${TARGET_DIR}/scripts/firebase-config.js" <<EOF
          window.__PREPIFY_PUBLIC_CONFIG__ = {
            firebase: {
              apiKey: "${NEXT_PUBLIC_FIREBASE_API_KEY}",
              authDomain: "${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}",
              projectId: "${NEXT_PUBLIC_FIREBASE_PROJECT_ID}",
              storageBucket: "${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}",
              messagingSenderId: "${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}",
              appId: "${NEXT_PUBLIC_FIREBASE_APP_ID}",
              measurementId: "${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}"
            },
            gaMeasurementId: "${NEXT_PUBLIC_GA_ID:-$NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}"
          };
          EOF

          test -f scripts/firebase-config.js

      - name: Verify runtime config file exists
        run: |
          test -f scripts/firebase-config.js || test -f dist/scripts/firebase-config.js
          find . -path "*/scripts/firebase-config.js" -print

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
